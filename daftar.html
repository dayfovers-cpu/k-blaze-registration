<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pendaftaran</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="text/javascript"
  src="https://cdn.emailjs.com/sdk/3.2.0/email.min.js">
</script>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo">
      <i class="fas fa-basketball-ball"></i>
      <span>K'blaze Basketball</span>
    </div>
    <div class="nav-menu">
      <a href="index.html" class="nav-link">Home</a>
      <a href="daftar.html" class="nav-link active">Daftar</a>
    </div>
  </div>
</nav>

<section class="register-section">
  <div class="container">
    <div class="form-container">
      <div class="form-header">
        <i class="fas fa-user-plus"></i>
        <h2>Form Pendaftaran</h2>
      </div>
      <form id="registrationForm" class="register-form">
        <div class="input-group">
          <input type="text" id="nama" required>
          <label for="nama">Nama Lengkap</label>
          <i class="fas fa-user"></i>
        </div>
        <div class="input-group">
          <input type="tel" id="telepon" required>
          <label for="telepon">Nomor WhatsApp</label>
          <i class="fas fa-phone"></i>
        </div>
        <button id="daftarBtn" type="submit" class="submit-btn">
          <span>Daftar</span>
          <i class="fas fa-basketball-ball"></i>
        </button>
      </form>
      <div id="successMessage" style="display:none; color:#4CAF50; margin-top:15px; font-weight:bold;">
Pendaftaran berhasil! Kami akan menghubungi Anda segera.
      </div>
    </div>
  </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
</html>
